{% set name = "unstructured" %}
{% set version = "0.20.2" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/unstructured-{{ version }}.tar.gz
  sha256: ab8d506a9bce005d74c4a6c6198fa5397dbf5df8f174f90e4935a00b08b842be

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
  run:
    - numba >=0.60.0,<1.0.0
    - ndjson
    - html5lib >=1.1,<2.0.0
    - typing_extensions >=4.15.0,<5.0.0
    - python-oxmsg >=0.0.2,<1.0.0
    - psutil >=7.2.2,<8.0.0
    - python >={{ python_min }},<3.13
    - backoff
    - beautifulsoup4 >=4.14.3,<5.0.0
    - certifi =2024.2.2
    - chardet
    - charset-normalizer >=3.4.4,<4.0.0
    - click =8.1.7
    - dataclasses-json
    - emoji >=2.15.0,<3.0.0
    - filetype >=1.2.0,<2.0.0
    - idna =3.6
    - joblib =1.3.2
    - jsonpath-python =1.0.6
    - langdetect >=1.0.9,<2.0.0
    - lxml >=5.0.0,<7.0.0
    - marshmallow =3.20.2
    - mypy_extensions =1.0.0
    - nltk >=3.9.2,<4.0.0
    - numpy >=1.26.0,<3.0.0
    - packaging =23.2
    - python-dateutil =2.8.2
    - python-iso639 >=2026.1.31,<2027.0.0
    - python-magic >=0.4.27,<1.0.0
    - rapidfuzz >=3.14.3,<4.0.0
    - regex =2023.12.25
    - requests >=2.32.5,<3.0.0
    - six =1.16.0
    - soupsieve =2.5
    - tabulate
    - tqdm >=4.67.3,<5.0.0
    - typing-extensions
    - typing_inspect =0.9.0
    - unstructured-client >=0.25.9,<1.0.0
    - urllib3 =1.26.18
    - wrapt >=2.1.1,<3.0.0

test:
  imports:
    - unstructured
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/Unstructured-IO/unstructured
  summary: A library that prepares raw documents for downstream ML tasks.
  license: Apache-2.0
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - jan-janssen
